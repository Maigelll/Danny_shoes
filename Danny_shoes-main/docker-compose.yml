version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: dannyshoes_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dannyshoes
      POSTGRES_PASSWORD: dannyshoes_dev_2024
      POSTGRES_DB: dannyshoes_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dannyshoes -d dannyshoes_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dannyshoes_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass dannyshoes_redis_2024
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "dannyshoes_redis_2024", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: dannyshoes_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: postgres

volumes:
  postgres_data:
  redis_data:
