name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy → 148.230.88.92
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          command_timeout: 10m
          script: |
            set -e

            cd /root/dannyshoes

            echo ">>> Pull últimos cambios"
            git pull origin main

            echo ">>> Instalar dependencias"
            pnpm install --frozen-lockfile

            echo ">>> Generar cliente Prisma"
            pnpm db:generate

            echo ">>> Migrar base de datos"
            pnpm db:migrate

            echo ">>> Compilar shared packages"
            cd packages/shared && npx tsc --project tsconfig.json && cd ../..
            cd packages/database && npx tsc --project tsconfig.json; cd ../..

            echo ">>> Build API (NestJS)"
            pnpm --filter @dannyshoes/api build

            echo ">>> Build Web (Next.js)"
            NEXT_PUBLIC_API_URL="http://${{ secrets.VPS_HOST }}:4000/api/v1" \
            pnpm --filter @dannyshoes/web build

            echo ">>> Levantar Docker (Postgres + Redis)"
            docker compose up -d

            echo ">>> Recargar PM2"
            pm2 startOrReload /root/dannyshoes/ecosystem.config.js --update-env
            pm2 save

            echo ">>> Deploy completado"
